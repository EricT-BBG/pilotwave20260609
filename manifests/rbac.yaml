apiVersion: v1
kind: ServiceAccount
metadata:
  name: pilotwave
  namespace: pilotwave
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pilotwave
  namespace: pilotwave
rules:
# Allow actions on basic Kubernetes objects
- apiGroups: [""]
  resources: ["namespaces", "pods", "services", "secrets"]
  verbs: ["*"]
- apiGroups: ["networking.istio.io"]
  resources: ["*"]
  verbs: ["*"]  
- apiGroups: ["security.istio.io"]
  resources: ["*"]
  verbs: ["*"]  

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pilotwave
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pilotwave
subjects:
- kind: ServiceAccount
  name: pilotwave
  namespace: pilotwave
