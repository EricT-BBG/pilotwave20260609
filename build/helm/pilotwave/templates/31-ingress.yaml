{{- if .Values.ingress.enabled }}
{{- $fullName := include "pilotwave.fullname" . -}}
{{- $servicePort := .Values.service.port -}}
{{- $ingressHosts := .Values.ingress.hosts -}}
{{- if and (not $ingressHosts) .Values.ingress.host -}}
{{- $ingressHosts = list (dict "host" .Values.ingress.host "paths" (list (dict "path" .Values.ingress.path "pathType" .Values.ingress.pathType))) -}}
{{- end -}}
{{- if not $ingressHosts }}
{{- fail "ingress.enabled=true requires ingress.host or ingress.hosts" }}
{{- end -}}
{{- if and .Values.ingress.tls.enabled (not .Values.ingress.tlsEntries) (not .Values.ingress.tls.secretName) }}
{{- fail "ingress.tls.enabled=true requires ingress.tls.secretName unless ingress.tlsEntries is set" }}
{{- end -}}
{{- $useV1 := .Capabilities.APIVersions.Has "networking.k8s.io/v1/Ingress" -}}
apiVersion: {{ ternary "networking.k8s.io/v1" "networking.k8s.io/v1beta1" $useV1 }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "pilotwave.labels" . | indent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  {{- if and $useV1 .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tlsEntries }}
  tls:
{{ toYaml .Values.ingress.tlsEntries | indent 4 }}
  {{- else if .Values.ingress.tls.enabled }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName | quote }}
      hosts:
      {{- if .Values.ingress.tls.hosts }}
{{ toYaml .Values.ingress.tls.hosts | indent 8 }}
      {{- else if .Values.ingress.host }}
        - {{ .Values.ingress.host | quote }}
      {{- end }}
  {{- end }}
  rules:
    {{- range $ingressHosts }}
    - {{- with .host }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ default "/" .path | quote }}
            {{- if or $useV1 .pathType }}
            pathType: {{ default "Prefix" .pathType }}
            {{- end }}
            backend:
              {{- if $useV1 }}
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $servicePort }}
              {{- else }}
              serviceName: {{ $fullName }}
              servicePort: {{ $servicePort }}
              {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
