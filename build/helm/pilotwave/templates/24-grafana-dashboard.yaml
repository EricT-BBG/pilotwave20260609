{{- if .Values.grafanaDashboard.enabled }}
{{- $dashboardJSON := "" | b64dec -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-grafana-dashboard" (include "pilotwave.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ default .Release.Namespace .Values.grafanaDashboard.namespace }}
  labels:
{{ include "pilotwave.labels" . | indent 4 }}
{{- with .Values.grafanaDashboard.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
data:
  pilotwave-dashboard.json: |
{{ $dashboardJSON | indent 4 }}
{{- end }}
