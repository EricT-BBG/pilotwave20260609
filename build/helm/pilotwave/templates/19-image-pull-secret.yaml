{{- if or .Values.imagePullSecret.create .Values.imageCredentials.create }}
{{- $registry := required "imagePullSecret.registry is required when imagePullSecret.create=true" (coalesce .Values.imagePullSecret.registry .Values.imageCredentials.registry) -}}
{{- $username := required "imagePullSecret.username is required when imagePullSecret.create=true" (coalesce .Values.imagePullSecret.username .Values.imageCredentials.username) -}}
{{- $password := required "imagePullSecret.password is required when imagePullSecret.create=true" (coalesce .Values.imagePullSecret.password .Values.imageCredentials.password) -}}
{{- $email := default "" (coalesce .Values.imagePullSecret.email .Values.imageCredentials.email) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pilotwave.imagePullSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "pilotwave.labels" . | indent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"email\":\"%s\",\"auth\":\"%s\"}}}" $registry $username $password $email (printf "%s:%s" $username $password | b64enc) | b64enc | quote }}
{{- end }}
