{{- if not .Values.auth.secret.existingSecret }}
{{- $authSecretName := include "pilotwave.authSecretName" . -}}
{{- $authSecretKey := include "pilotwave.authSecretKey" . -}}
{{- $existingAuthSecret := lookup "v1" "Secret" .Release.Namespace $authSecretName -}}
{{- $existingAuthSecretValue := "" -}}
{{- if and $existingAuthSecret (hasKey $existingAuthSecret "data") (hasKey $existingAuthSecret.data $authSecretKey) -}}
{{- $existingAuthSecretValue = index $existingAuthSecret.data $authSecretKey | b64dec -}}
{{- end -}}
{{- $authSecretValue := default (default (randAlphaNum 32) $existingAuthSecretValue) .Values.auth.secret.value -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $authSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "pilotwave.labels" . | indent 4 }}
type: Opaque
stringData:
  {{ $authSecretKey }}: {{ $authSecretValue | quote }}
{{- end }}
