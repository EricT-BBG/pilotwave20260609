{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled .Values.ingress.tls.createSecret }}
{{- $secretName := required "ingress.tls.secretName is required when ingress.tls.createSecret=true" .Values.ingress.tls.secretName -}}
{{- $tlsKey := required "ingress.tls.key is required when ingress.tls.createSecret=true" .Values.ingress.tls.key -}}
{{- $tlsCert := required "ingress.tls.certificate is required when ingress.tls.createSecret=true" .Values.ingress.tls.certificate -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "pilotwave.labels" . | indent 4 }}
type: kubernetes.io/tls
data:
  tls.key: {{ $tlsKey | b64enc | quote }}
  tls.crt: {{ $tlsCert | b64enc | quote }}
{{- end }}
