  /gateway/tls-secret/exists:
    get:
      summary: Check Gateway TLS secret
      description: Resolves a Gateway TLS credential name to the configured Kubernetes Secret namespace and reports whether the Secret exists.
      operationId: get-gateway-tls-secret-exists
      tags:
        - gateway
      parameters:
        - name: credentialname
          in: query
          required: true
          description: Gateway TLS credential name. Use `namespace/name` to check an explicit Secret namespace; otherwise Pilotwave uses the configured Gateway TLS Secret namespace.
          schema:
            type: string
      security:
        - Authentication: []
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayTLSSecretExistsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                type: object
  /gateway/{namespace}/{name}/tls-certificates:
    get:
      summary: List Gateway TLS certificates
      description: Returns certificate metadata for TLS-enabled servers on a Gateway. Private keys and raw certificate PEM data are never returned.
      operationId: get-gateway-namespace-name-tls-certificates
      tags:
        - gateway
      parameters:
        - name: namespace
          in: path
          required: true
          description: namespace
          schema:
            type: string
        - name: name
          in: path
          required: true
          description: name
          schema:
            type: string
      security:
        - Authentication: []
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayTLSCertificatesResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    GatewayTLSSecretExistsResponse:
      type: object
      properties:
        exists:
          type: boolean
        secretNamespace:
          type: string
        secretName:
          type: string
    GatewayTLSCertificatesResponse:
      type: object
      properties:
        certificates:
          type: array
          items:
            $ref: '#/components/schemas/GatewayTLSCertificate'
    GatewayTLSCertificate:
      type: object
      properties:
        serverIndex:
          type: integer
        port:
          type: integer
          format: int32
        protocol:
          type: string
          example: HTTPS
        hosts:
          type: array
          items:
            type: string
        credentialName:
          type: string
        secretNamespace:
          type: string
        secretName:
          type: string
        status:
          type: string
          enum:
            - healthy
            - warning
            - critical
            - expired
            - missing
            - invalid
            - unknown
        reason:
          type: string
        daysUntilExpiry:
          type: integer
        notBefore:
          type: string
          format: date-time
        notAfter:
          type: string
          format: date-time
        subject:
          type: string
        issuer:
          type: string
        dnsNames:
          type: array
          items:
            type: string
        fingerprintSHA256:
          type: string
